<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body
  class="flex min-h-screen
         bg-slate-50 dark:bg-slate-900
         text-slate-800 dark:text-slate-100
         transition-colors duration-300"
>

<!-- ================= SIDEBAR ================= -->
<aside
  class="w-64
         bg-white dark:bg-slate-900
         border-r border-slate-200 dark:border-slate-700
         px-6 py-5 space-y-8"
>

  <!-- Logo -->
  <div class="flex items-center gap-2 font-bold text-lg">
    <span
      class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center"
    >
      ✓
    </span>
    TaskFlow
  </div>

  <!-- Tareas -->
  <div>
    <p class="text-xs text-slate-400 dark:text-slate-500 uppercase mb-3">
      Tareas
    </p>
    <ul class="space-y-1 text-sm">
      <li
        data-filter="all"
        class="flex justify-between items-center px-3 py-2 rounded-lg
               hover:bg-slate-100 dark:hover:bg-slate-800
               cursor-pointer"
      >
        <span class="flex items-center gap-2">📋 Todas</span>
        <span class="text-xs text-slate-400 dark:text-slate-500">0</span>
      </li>

      <li
        data-filter="pending"
        class="flex justify-between items-center px-3 py-2 rounded-lg
               hover:bg-slate-100 dark:hover:bg-slate-800
               cursor-pointer"
      >
        <span class="flex items-center gap-2">⏳ Pendientes</span>
        <span class="text-xs text-slate-400 dark:text-slate-500">0</span>
      </li>

      <li
        data-filter="completed"
        class="flex justify-between items-center px-3 py-2 rounded-lg
               hover:bg-slate-100 dark:hover:bg-slate-800
               cursor-pointer"
      >
        <span class="flex items-center gap-2">✅ Completadas</span>
        <span class="text-xs text-slate-400 dark:text-slate-500">0</span>
      </li>
    </ul>
  </div>

  <!-- Vista -->
  <div>
    <p class="text-xs text-slate-400 dark:text-slate-500 uppercase mb-3">
      Vista
    </p>
    <div
      class="px-3 py-2 rounded-lg
             bg-slate-100 dark:bg-slate-800
             text-slate-800 dark:text-slate-100
             text-sm font-medium flex items-center gap-2"
    >
      📊 Estadísticas
    </div>
  </div>

  <!-- Acciones -->
  <div class="space-y-2">
    <button
      id="theme-toggle"
      class="w-full px-3 py-2 rounded-lg
             bg-slate-200 dark:bg-slate-700
             text-slate-800 dark:text-slate-100
             text-sm"
    >
      🌙 Modo oscuro
    </button>

    <button
      id="complete-all"
      class="w-full px-3 py-2 rounded-lg
             bg-blue-600 hover:bg-blue-700
             text-white text-sm"
    >
      Completar todas
    </button>

    <button
      id="clear-completed"
      class="w-full px-3 py-2 rounded-lg
             bg-red-600 hover:bg-red-700
             text-white text-sm"
    >
      Borrar completadas
    </button>
  </div>
</aside>

<!-- ================= MAIN ================= -->
<main class="flex-1 px-10 py-8 space-y-10">

  <!-- Header -->
  <header class="text-xl font-semibold flex items-center gap-2">
    📊 Estadísticas
  </header>

  <!-- Cards -->
  <section class="grid grid-cols-2 gap-6 max-w-4xl">
    <div
      class="bg-white dark:bg-slate-800
             border border-slate-200 dark:border-slate-700
             rounded-xl p-5 shadow-sm"
    >
      <div class="text-sm text-slate-500 dark:text-slate-400">Total 🔢</div>
      <div class="text-2xl font-bold mt-2" id="total">0</div>
    </div>

    <div
      class="bg-white dark:bg-slate-800
             border border-slate-200 dark:border-slate-700
             rounded-xl p-5 shadow-sm"
    >
      <div class="text-sm text-slate-500 dark:text-slate-400">Completadas ✅</div>
      <div class="text-2xl font-bold mt-2" id="completed">0</div>
    </div>

    <div
      class="bg-white dark:bg-slate-800
             border border-slate-200 dark:border-slate-700
             rounded-xl p-5 shadow-sm"
    >
      <div class="text-sm text-slate-500 dark:text-slate-400">Pendientes ⏳</div>
      <div class="text-2xl font-bold mt-2" id="pending">0</div>
    </div>

    <div
      class="bg-white dark:bg-slate-800
             border border-slate-200 dark:border-slate-700
             rounded-xl p-5 shadow-sm"
    >
      <div class="text-sm text-slate-500 dark:text-slate-400">Progreso 📈</div>
      <div class="text-2xl font-bold mt-2" id="progress">0%</div>
    </div>
  </section>

  <!-- Progreso -->
  <section
    class="bg-white dark:bg-slate-800
           border border-slate-200 dark:border-slate-700
           rounded-xl p-6 max-w-4xl"
  >
    <p class="font-medium mb-3">Progreso general</p>
    <progress
      value="0"
      max="100"
      class="w-full h-2
             [&::-webkit-progress-bar]:bg-slate-200
             dark:[&::-webkit-progress-bar]:bg-slate-700
             [&::-webkit-progress-value]:bg-green-500"
    ></progress>
    <p id="progress-detail" class="text-xs text-slate-400 dark:text-slate-500 mt-2">
      0 de 0 tareas completadas
    </p>
  </section>

  <!-- Tareas -->
  <section class="max-w-4xl space-y-4">
    <div class="flex gap-3">
      <input
        id="task-input"
        class="flex-1 px-4 py-2 rounded-lg border
               bg-white text-slate-800
               dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700
               placeholder:text-slate-400 dark:placeholder:text-slate-500"
        placeholder="Añadir nueva tarea..."
      />
      <select
        id="priority-select"
        class="px-4 py-2 rounded-lg border bg-white text-slate-800 dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700"
      >
        <option value="medium">Prioridad media</option>
        <option value="high">Prioridad alta</option>
        <option value="low">Prioridad baja</option>
      </select>
      <input
        id="due-date-input"
        type="date"
        class="px-4 py-2 rounded-lg border bg-white text-slate-800 dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700"
      />
      <input
        id="search-input"
        class="px-4 py-2 rounded-lg border
               bg-white text-slate-800
               dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700
               placeholder:text-slate-400 dark:placeholder:text-slate-500"
        placeholder="Buscar"
      />
      <select
        id="sort-select"
        class="px-4 py-2 rounded-lg border bg-white text-slate-800 dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700"
      >
        <option value="newest">Mas recientes</option>
        <option value="oldest">Mas antiguas</option>
        <option value="az">A-Z</option>
        <option value="completed-first">Completadas primero</option>
        <option value="priority-high">Prioridad alta primero</option>
      </select>
    </div>
    <p id="task-input-error" class="hidden text-sm text-red-500" aria-live="polite"></p>
    <div id="undo-banner" class="hidden text-sm bg-slate-100 dark:bg-slate-800 px-3 py-2 rounded-lg flex items-center justify-between">
      <span id="undo-message">Tarea eliminada.</span>
      <button id="undo-delete" class="text-blue-600 dark:text-blue-300 font-medium">Deshacer</button>
    </div>

    <!-- Lista -->
    <ul id="task-list" class="space-y-3"></ul>

    <!-- Estado vacío -->
    <div id="empty-state" class="text-center text-slate-400 dark:text-slate-500 mt-16">
      <div class="text-5xl mb-4">📋</div>
      <p class="font-medium">No hay tareas</p>
      <p class="text-sm">Añade una nueva tarea para empezar</p>
    </div>
  </section>
</main>

<!-- Template -->
<template id="task-template">
  <li
    class="flex items-center gap-3
           bg-white dark:bg-slate-800
           border border-slate-200 dark:border-slate-700
           text-slate-800 dark:text-slate-100
           rounded-lg px-4 py-3"
  >
    <input type="checkbox" />
    <span class="task-text flex-1"></span>
    <span data-role="priority" class="text-xs px-2 py-1 rounded-full"></span>
    <span data-role="due-date" class="text-xs text-slate-500 dark:text-slate-400"></span>
    <button class="text-red-500 hover:text-red-600">✕</button>
  </li>
</template>

<script type="module" src="app.js"></script>
</body>
</html>
